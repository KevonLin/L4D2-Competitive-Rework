// ReadyUp Cvars
l4d_ready_cfg_name "ZoneMod Remix v1.3"

// Confogl Cvars
confogl_addcvar mp_gamemode "versus"  // Force Versus for the config.
confogl_addcvar z_difficulty "normal" // Force normal Difficulty to prevent co-op difficulty impacting the config.
confogl_addcvar confogl_pills_limit 4 // Limits the number of pain pills on each map outside of saferooms. -1: no limit; >=0: limit to cvar value

// ZoneMod 4v4 Cvars
confogl_addcvar survivor_limit 4
confogl_addcvar z_max_player_zombies 4
confogl_addcvar z_common_limit 30
confogl_addcvar z_ghost_delay_min 17
confogl_addcvar z_ghost_delay_max 17
confogl_addcvar z_mega_mob_size 50
confogl_addcvar z_mob_spawn_min_size 15
confogl_addcvar z_mob_spawn_max_size 15
confogl_addcvar z_mob_spawn_min_interval_normal 3600
confogl_addcvar z_mob_spawn_max_interval_normal 3600
confogl_addcvar z_pounce_damage 2
confogl_addcvar z_pounce_damage_interval 0.2
confogl_addcvar hunter_pz_claw_dmg 6

// ZoneMod Remix Cvars
//confogl_addcvar z_versus_smoker_limit 1
//confogl_addcvar z_versus_boomer_limit 1
//confogl_addcvar z_versus_hunter_limit 1
//confogl_addcvar z_versus_spitter_limit 1
//confogl_addcvar z_versus_jockey_limit 1
//confogl_addcvar z_versus_charger_limit 1
// Charger adjuestment
confogl_addcvar z_charge_duration 10
confogl_addcvar z_charge_max_speed 700
confogl_addcvar z_tank_health 5000

// ZoneMod Shared Cvars
exec cfgogl/zonemodremix/shared_cvars.cfg

// Config Cvars
exec cfgogl/zonemodremix/zonemodremix.cfg
